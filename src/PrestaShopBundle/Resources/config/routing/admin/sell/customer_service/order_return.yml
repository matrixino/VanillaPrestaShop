# Routes backing the "Sell > Customer Service > Merchandise Returns" admin page.
admin_merchandise_returns_index:
  path: /
  methods: [ GET ]
  defaults:
    _controller: PrestaShopBundle\Controller\Admin\Sell\CustomerService\OrderReturnController::indexAction
    _legacy_controller: AdminReturn
    _legacy_link: AdminReturn
    _legacy_feature_flag: merchandise_return

admin_merchandise_returns_save_options:
  path: /options
  methods: [ PATCH, POST ]
  defaults:
    _controller: PrestaShopBundle\Controller\Admin\Sell\CustomerService\OrderReturnController::indexAction
    _legacy_controller: AdminReturn
    _legacy_link: AdminReturn:submitOptionsorder_return
    _legacy_feature_flag: merchandise_return

admin_merchandise_returns_filter:
  path: /
  methods: [ POST ]
  defaults:
    _controller: PrestaShopBundle\Controller\Admin\CommonController::searchGridAction
    gridDefinitionFactoryServiceId: prestashop.core.grid.definition.factory.order_return
    redirectRoute: admin_merchandise_returns_index
    _legacy_controller: AdminReturn
    _legacy_link: AdminReturn:submitFilterorder_return
    _legacy_feature_flag: merchandise_return

admin_order_returns_edit:
  path: /{orderReturnId}/edit
  methods: [ GET, POST ]
  defaults:
    _controller: PrestaShopBundle\Controller\Admin\Sell\CustomerService\OrderReturnController::editAction
    _legacy_controller: AdminReturn
    _legacy_link: AdminReturn:updateorder_return
    _legacy_parameters:
      id_order_return: orderReturnId
    _legacy_feature_flag: merchandise_return
  requirements:
    orderReturnId: \d+

admin_order_returns_update:
  path: /{orderReturnId}/update
  methods: [ POST ]
  defaults:
    _controller: PrestaShopBundle\Controller\Admin\Sell\CustomerService\OrderReturnController::editAction
    _legacy_controller: AdminReturn
    _legacy_link: AdminReturn:updateorder_return
    _legacy_parameters:
      id_order_return: orderReturnId
    _legacy_feature_flag: merchandise_return
  requirements:
    orderReturnId: \d+

admin_order_returns_pdf:
  path: /{orderReturnId}/pdf
  methods: [ GET ]
  defaults:
    _controller: PrestaShopBundle\Controller\Admin\Sell\CustomerService\OrderReturnController::downloadPdfAction
    _legacy_controller: AdminReturn
    _legacy_link: AdminPdf:generateOrderReturn
    _legacy_parameters:
      id_order_return: orderReturnId
    _legacy_feature_flag: merchandise_return
  requirements:
    orderReturnId: \d+

admin_order_returns_delete:
  path: /{orderReturnId}/delete
  methods: [ POST ]
  defaults:
    _controller: PrestaShopBundle\Controller\Admin\Sell\CustomerService\OrderReturnController::deleteAction
    _legacy_controller: AdminReturn
    _legacy_link: AdminReturn:deleteorder_return
    _legacy_parameters:
      id_order_return: orderReturnId
    _legacy_feature_flag: merchandise_return
  requirements:
    orderReturnId: \d+

admin_order_returns_bulk_delete:
  path: /bulk-delete
  methods: [ POST ]
  defaults:
    _controller: PrestaShopBundle\Controller\Admin\Sell\CustomerService\OrderReturnController::bulkDeleteAction
    _legacy_controller: AdminReturn
    _legacy_link: AdminReturn:submitBulkdeleteorder_return
    _legacy_feature_flag: merchandise_return
